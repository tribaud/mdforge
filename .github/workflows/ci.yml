name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile extension (tsc)
        run: npm run compile:ext

      - name: Type-check webview
        run: npx tsc -p media-src --noEmit

      - name: Bundle webview (esbuild)
        run: npm run build:webview
